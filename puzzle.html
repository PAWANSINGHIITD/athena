{% extends "base.html" %}
{% block content %}
<h2>{{ puzzle.title }}</h2>
<p>{{ puzzle.prompt }}</p>
{% if puzzle.example %}<pre>Example: {{ puzzle.example }}</pre>{% endif %}
<form method="post">
  Answer: <input name="answer">
  <button type="submit">Submit</button>
</form>
{% if feedback %}<p><b>{{ feedback }}</b></p>{% endif %}
{% endblock %}
